{% extends "base.html" %}
{% block title %}Confirmar eliminación{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-7">
    <div class="card">
      <div class="card-body p-4">
        <div class="d-flex align-items-start gap-3 mb-3">
          <div class="metric-icon text-danger"><i class="bi bi-exclamation-triangle"></i></div>
          <div>
            <h1 class="h4 mb-1">Confirmar eliminación</h1>
            <p class="text-muted mb-0">Esta acción elimina el registro de forma permanente.</p>
          </div>
        </div>
        <form method="post" class="d-flex flex-wrap gap-2">{% csrf_token %}
          <button class="btn btn-danger" type="submit"><i class="bi bi-trash"></i> Eliminar</button>
          <a class="btn btn-outline-secondary" href="javascript:history.back()">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
